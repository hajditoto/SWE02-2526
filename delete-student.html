
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Student - Student Grade Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-5">
        <div class="container">
            <a class='navbar-brand mb-0 h1' href='/'>Student Grade Tracker</a>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card border-danger">
                    <div class="card-body p-5">
                        <h2 class="card-title text-danger mb-3">Delete Student</h2>
                        <p class="mb-4">Are you sure you want to delete this student?</p>

                        <div class="alert alert-light" id="studentInfo">
                            <p><strong>Name:</strong> <span id="infoName"></span></p>
                            <p><strong>Student ID:</strong> <span id="infoId"></span></p>
                        </div>

                        <p class="text-muted small mb-4">This action cannot be undone.</p>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <a class='btn btn-secondary' href='/'>Cancel</a>
                            <button type="button" class="btn btn-danger" id="confirmDeleteBtn">Yes, Delete Student</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="scripts/delete-student.js"></script>
</body>
</html>
