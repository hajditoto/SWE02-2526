
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Grade Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-5">
        <div class="container">
            <a class='navbar-brand mb-0 h1' href='index.html'>Student Grade Tracker</a>
        </div>
    </nav>

    <div class="container">
        <div class="row mb-4">
            <div class="col-md-8">
                <h2>Student Management</h2>
            </div>
            <div class="col-md-4 text-end">
                <a class='btn btn-primary' href='add-student.html'>+ Add Student</a>
                <button class="btn btn-danger ms-2" id="clearAllBtn">Clear All</button>
            </div>
        </div>

        <!-- Students Table -->
        <div class="card">
            <div class="table-responsive">
                <table class="table table-hover mb-0" id="studentsTable">
                    <thead class="table-dark">
                        <tr>
                            <th>Name (ID)</th>
                            <th>Math</th>
                            <th>English</th>
                            <th>Science</th>
                            <th>Average</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr>
                            <td colspan="7" class="text-center text-muted py-4">
                                No students added yet. Click "Add Student" to get started.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="scripts/index.js"></script>

</body>
</html>
