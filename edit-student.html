
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Student - Student Grade Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-5">
        <div class="container">
            <a class='navbar-brand mb-0 h1' href='/'>Student Grade Tracker</a>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body p-5">
                        <h2 class="card-title mb-4">Edit Student</h2>
                        <form id="editStudentForm">
                            <div class="mb-3">
                                <label for="studentName" class="form-label">Full Name</label>
                                <input type="text" class="form-control" id="studentName" required>
                            </div>
                            <div class="mb-3">
                                <label for="studentId" class="form-label">Student ID</label>
                                <input type="text" class="form-control" id="studentId" readonly>
                            </div>
                            <div class="mb-3">
                                <label for="mathGrade" class="form-label">Math Grade</label>
                                <input type="number" class="form-control" id="mathGrade" min="0" max="100" required>
                            </div>
                            <div class="mb-3">
                                <label for="englishGrade" class="form-label">English Grade</label>
                                <input type="number" class="form-control" id="englishGrade" min="0" max="100" required>
                            </div>
                            <div class="mb-3">
                                <label for="scienceGrade" class="form-label">Science Grade</label>
                                <input type="number" class="form-control" id="scienceGrade" min="0" max="100" required>
                            </div>
                            <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                                <a class='btn btn-secondary' href='/'>Cancel</a>
                                <button type="submit" class="btn btn-primary">Update Student</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js" integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="scripts/edit-student.js"></script>
</body>
</html>
